<!DOCTYPE html> 
<html>
    <head>
        <title>Pokemon Team Builder</title>  
        <link rel="stylesheet" href="Pokemon_CSS.css">
    </head>
    <body>
        <main>
            <h3>Name or ID</h3>
            <input type="text" id="pokemonInput" name="pokemonInput">
            <button onclick="findPokemonInfo()" id="findButton">Find</button>

            <img id="pokemonImage" src="https://img.freepik.com/free-vector/camouflage-pattern-texture-pixel-gray-shades-background_1017-30109.jpg?semt=ais_rp_progressive&w=740&q=80" alt="Pokemon Image">
            <audio id="pokemonAudio" controls>
                <source id="pokemonAudioSource" src="" type="audio/ogg">
                Your browser does not support the audio element.
            </audio>

            <div id="pokemonMoves">
                <form id="PM1"> 
                    <select name="1move1" id="select1">
                        <option value="">Select a move</option>
                        <option value="">Select a move</option>
                        <option value="">Select a move</option>
                        <option value="">Select a move</option>
                    </select>
                </form>

                <form id="PM2"> 
                    <select name="2move1" id="select2">
                        <option value="">Select a move</option>
                        <option value="">Select a move</option>
                        <option value="">Select a move</option>
                        <option value="">Select a move</option>
                    </select>
                </form>

                <form id="PM3"> 
                    <select name="3move1" id="select3">
                        <option value="">Select a move</option>
                        <option value="">Select a move</option>
                        <option value="">Select a move</option>
                        <option value="">Select a move</option>
                    </select>
                </form>

                <form id="PM4"> 
                    <select name="4move1" id="select4">
                        <option value="">Select a move</option>
                        <option value="">Select a move</option>
                        <option value="">Select a move</option>
                        <option value="">Select a move</option>
                    </select>
                </form>
            </div>

            <button onclick="addToTeam()" id="addTeamButton">Add to Team</button>
        </main>

        <container id="teamDisplay">
            <div id="teamMember1">
                <img id="teamImage1" src="" alt="Team Pokemon 1">
                <ul>
                    <li></li>
                    <li></li>
                    <li></li>
                    <li></li>
                </ul>
            </div>

            <div id="teamMember2">
                <img id="teamImage2" src="" alt="Team Pokemon 2">
                <ul>
                    <li></li>
                    <li></li>
                    <li></li>
                    <li></li>
                </ul>
            </div>

            <div id="teamMember3">
                <img id="teamImage3" src="" alt="Team Pokemon 3">
                <ul>
                    <li></li>
                    <li></li>
                    <li></li>
                    <li></li>
                </ul>
            </div>

            <div id="teamMember4">
                <img id="teamImage4" src="" alt="Team Pokemon 4">
                <ul>
                    <li></li>
                    <li></li>
                    <li></li>
                    <li></li>
                </ul>
            </div>

        </container>
    </body>
    <script src="Pokemon_JS.js"></script>
</html>
